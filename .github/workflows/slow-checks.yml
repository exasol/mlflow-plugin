name: Slow-Checks

on:
  workflow_call:

jobs:

  tests:
    name: Integration Tests
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Free Disk Space
        run: |
         sudo rm -rf /usr/local/lib/android
         sudo rm -rf /usr/share/dotnet

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Run Tests and Collect Coverage
        run: >
          poetry run -- nox -s test:integration --
          -rA --setup-show -o log_cli=true -o log_cli_level=INFO
          --coverage --db-version 2025.1.8 --backend onprem

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python3.10-slow
          path: .coverage
          include-hidden-files: true